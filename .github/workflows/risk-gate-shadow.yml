# SHADOW-MODE variant of risk-gate.yml — for the evaluation campaign ONLY.
#
# Differences from the blocking workflow (risk-gate.yml):
#   1. The scoring step has `continue-on-error: true`: a ROLLBACK decision is
#      RECORDED (outputs + artifact) but never fails the job -> no label censoring.
#   2. The test job runs unconditionally (`if: always()` on top of `needs`), so
#      EVERY build gets a real pytest ground-truth label.
#   3. Consequence for the history features: this workflow's run conclusion equals
#      the real test outcome (the gate never fails the run), so hist_* computed from
#      past runs of THIS workflow reflects true build outcomes — the same label
#      semantics as offline training — instead of being contaminated by the gate's
#      own decisions.
#
# Campaign repos ship ONLY this workflow (never both, or every push runs twice).
# The production/demo repo keeps the blocking risk-gate.yml.

name: CI/CD Risk Gate (shadow)

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  risk-gate:
    name: Risk Gate (shadow — records, never blocks)
    runs-on: ubuntu-latest
    outputs:
      decision: ${{ steps.gate.outputs.decision }}
      probability: ${{ steps.gate.outputs.probability }}
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install risk-gate dependencies
        run: pip install -r ci_gate/requirements.txt

      - name: Resolve prev/current commit SHAs
        id: shas
        run: |
          CURR="${{ github.sha }}"
          EMPTY_TREE=$(git hash-object -t tree /dev/null)
          BEFORE="${{ github.event.before }}"
          if [ -n "$BEFORE" ] && [ "$BEFORE" != "0000000000000000000000000000000000000000" ] \
             && git cat-file -e "$BEFORE^{commit}" 2>/dev/null; then
            PREV="$BEFORE"
          else
            PREV="$EMPTY_TREE"
          fi
          echo "prev=$PREV" >> "$GITHUB_OUTPUT"
          echo "curr=$CURR" >> "$GITHUB_OUTPUT"

      - name: Extract live pre-build features
        run: >
          python ci_gate/extract_features.py
          ${{ steps.shas.outputs.prev }} ${{ steps.shas.outputs.curr }} risk-gate-shadow.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Score with the trained model (shadow — decision recorded, not enforced)
        id: gate
        continue-on-error: true
        run: python ci_gate/predict.py risk_gate_features.json

      - name: Upload risk-gate report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: risk-gate-report
          path: |
            risk_gate_features.json
            risk_gate_result.json

  test:
    name: Test suite (always runs — ground-truth label)
    needs: risk-gate
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install app dependencies
        run: pip install -r requirements.txt

      - name: Run test suite
        run: python -m pytest -q
